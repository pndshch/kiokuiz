<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c0a1f">
<title>キオクイズ — Kiokuiz</title>
<meta name="description" content="自分の好みを答えるうち、いつしか過去の自分が出題者になる。記憶のキャパシティを試される4択ゲーム。">
<meta property="og:title" content="キオクイズ — Kiokuiz">
<meta property="og:description" content="自分の好みを答えるうち、いつしか過去の自分が出題者になる。">
<meta property="og:type" content="website">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
    width:100%; min-height:100%;
    overscroll-behavior:none;
    user-select:none; -webkit-user-select:none;
}
body {
    font-family: -apple-system, "Hiragino Maru Gothic ProN", "Yu Gothic UI", "Segoe UI", "Helvetica Neue", sans-serif;
    background:
        radial-gradient(ellipse at 20% 0%, #2a1860 0%, transparent 55%),
        radial-gradient(ellipse at 90% 90%, #4a1a6a 0%, transparent 55%),
        linear-gradient(180deg, #0e0825 0%, #0a0420 60%, #060214 100%);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    padding-bottom: env(safe-area-inset-bottom, 0);
}

/* twinkles */
.stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
        radial-gradient(1px 1px at 18% 28%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 64%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 42% 82%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 18%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 52% 48%, #fff 0%, transparent 100%),
        radial-gradient(2px 2px at 12% 72%, #ffd166 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 84% 38%, #c084fc 0%, transparent 100%);
    opacity: 0.45;
    animation: twinkle 4.5s ease-in-out infinite;
}
@keyframes twinkle { 0%,100%{opacity:0.35} 50%{opacity:0.65} }

/* ── Top bar ── */
.topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px 10px;
    background: linear-gradient(to bottom, rgba(10,4,32,0.92) 0%, rgba(10,4,32,0.4) 100%);
    backdrop-filter: blur(8px);
}
.title-block { display:flex; align-items:center; gap:10px; min-width: 0; }
.title-mark {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, #c084fc 0%, #f472b6 50%, #fb923c 100%);
    display:flex; align-items:center; justify-content:center;
    font-size: 20px;
    box-shadow: 0 4px 14px rgba(192,132,252,0.4);
    flex-shrink: 0;
}
.title-text { font-weight: 800; font-size: 17px; letter-spacing: -0.2px; }
.title-sub { font-size: 9px; color: #c9bfee; letter-spacing: 1.2px; text-transform: uppercase; }
.topbtns { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: transform 0.12s, background 0.15s;
}
.icon-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.18); }
.lang-pill { width: auto; padding: 0 11px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }

/* ── Screens ── */
.screen { display: none; padding: 16px 18px 32px; max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }
.screen.active { display: block; animation: fadein 0.3s ease; }
@keyframes fadein { from {opacity:0; transform: translateY(8px);} to {opacity:1; transform:none;} }

/* ── Home ── */
.hero {
    text-align: center;
    padding: 24px 8px 18px;
}
.hero-mark {
    width: 92px; height: 92px;
    border-radius: 28px;
    background: linear-gradient(135deg, #c084fc 0%, #f472b6 50%, #fb923c 100%);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 50px;
    margin-bottom: 14px;
    box-shadow: 0 10px 30px rgba(192,132,252,0.35);
    position: relative;
}
.hero-mark::after {
    content: ""; position: absolute; inset: -6px; border-radius: 32px;
    border: 2px solid rgba(192,132,252,0.35);
    animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1); opacity:0.7} 50%{transform:scale(1.05); opacity:0.3} }
.hero-title { font-size: 30px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
.hero-title .accent { background: linear-gradient(135deg, #f472b6, #fb923c); -webkit-background-clip: text; background-clip: text; color: transparent; }
.hero-tag { color: #c9bfee; font-size: 13px; letter-spacing: 1px; margin-bottom: 22px; }
.rules {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 22px;
    text-align: left;
}
.rules-title {
    font-size: 12px; font-weight: 700; color: #c084fc;
    letter-spacing: 1.5px; margin-bottom: 12px;
}
.rule { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13px; line-height: 1.55; color: #e8e3ff; }
.rule:last-child { margin-bottom: 0; }
.rule-icon {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800;
    background: rgba(192,132,252,0.18); color: #c084fc;
    margin-top: 1px;
}
.rule-icon.kioku { background: rgba(167,139,250,0.2); color: #a78bfa; }
.rule-icon.quiz  { background: rgba(244,114,182,0.2); color: #f472b6; }
.rule-icon.bad   { background: rgba(248,113,113,0.2); color: #f87171; }
.start-btn {
    display: block;
    width: 100%;
    padding: 18px 20px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(135deg, #c084fc 0%, #f472b6 60%, #fb923c 100%);
    color: #fff;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(192,132,252,0.4);
    transition: transform 0.12s, box-shadow 0.12s;
}
.start-btn:active { transform: scale(0.97); box-shadow: 0 4px 12px rgba(192,132,252,0.3); }
.best-score-line {
    text-align: center;
    margin-top: 14px;
    color: #c9bfee;
    font-size: 12px;
    letter-spacing: 0.5px;
}
.best-score-line strong { color: #ffd166; font-weight: 800; }

/* ── Game screen ── */
.game-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
}
.stat-cell {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 8px 10px;
    text-align: center;
}
.stat-label { font-size: 9px; color: #b8b3d8; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 2px; }
.stat-value { font-size: 18px; font-weight: 800; color: #fff; }
.stat-value.brain { color: #a78bfa; }
.stat-value.score { color: #fbbf24; }
.stat-value.best  { color: #f472b6; }

.phase-card {
    border-radius: 22px;
    padding: 22px 18px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    border: 2px solid rgba(255,255,255,0.08);
    transition: background 0.4s, border-color 0.4s;
    position: relative;
    overflow: hidden;
}
.phase-card.kioku {
    background: linear-gradient(160deg, #2e1f6b 0%, #1a1248 60%, #0e0a32 100%);
    border-color: rgba(167,139,250,0.45);
}
.phase-card.quiz {
    background: linear-gradient(160deg, #5a1a3e 0%, #3a0d2a 50%, #1f0618 100%);
    border-color: rgba(244,114,182,0.55);
}

.phase-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
}
.phase-card.kioku .phase-badge {
    background: rgba(167,139,250,0.18);
    color: #c4b5fd;
    border: 1px solid rgba(167,139,250,0.45);
}
.phase-card.quiz .phase-badge {
    background: rgba(244,114,182,0.18);
    color: #fbcfe8;
    border: 1px solid rgba(244,114,182,0.55);
    animation: questPulse 1.6s ease-in-out infinite;
}
@keyframes questPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(244,114,182,0.4); }
    50% { box-shadow: 0 0 0 5px rgba(244,114,182,0); }
}

.phase-hint {
    font-size: 11px;
    color: #c9bfee;
    margin-bottom: 6px;
    letter-spacing: 0.4px;
}
.phase-card.quiz .phase-hint { color: #fbcfe8; }

.question {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.45;
    margin-bottom: 22px;
    min-height: 64px;
    color: #fff;
    word-break: break-word;
}

.choices {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
}
.choice {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.18);
    color: #fff;
    padding: 16px 16px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    text-align: left;
    cursor: pointer;
    line-height: 1.4;
    transition: transform 0.1s, background 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 56px;
    font-family: inherit;
}
.choice:active { transform: scale(0.98); }
.phase-card.kioku .choice:hover { background: rgba(167,139,250,0.16); border-color: rgba(167,139,250,0.6); }
.phase-card.quiz  .choice:hover { background: rgba(244,114,182,0.16); border-color: rgba(244,114,182,0.6); }

.choice-num {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 800;
    background: rgba(255,255,255,0.12);
    color: #fff;
    letter-spacing: 0.5px;
}
.phase-card.kioku .choice-num { background: rgba(167,139,250,0.3); color: #ddd6fe; }
.phase-card.quiz  .choice-num { background: rgba(244,114,182,0.3); color: #fce7f3; }

.choice.correct {
    background: rgba(34,197,94,0.25) !important;
    border-color: rgba(34,197,94,0.7) !important;
    animation: flashGreen 0.5s ease;
}
.choice.wrong {
    background: rgba(239,68,68,0.25) !important;
    border-color: rgba(239,68,68,0.75) !important;
    animation: shake 0.45s ease;
}
.choice.dim { opacity: 0.4; }
@keyframes flashGreen {
    0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    50% { box-shadow: 0 0 0 6px rgba(34,197,94,0.3); }
}
@keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
}

/* memory growth visualization */
.brain-strip {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    min-height: 18px;
}
.memory-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa, #c084fc);
    box-shadow: 0 0 6px rgba(167,139,250,0.5);
    animation: dotpop 0.35s ease;
}
@keyframes dotpop {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

/* ── Game over ── */
.over-card {
    background: linear-gradient(160deg, #4a0a1c 0%, #2a0612 60%, #0e030a 100%);
    border: 2px solid rgba(248,113,113,0.4);
    border-radius: 22px;
    padding: 24px 18px 22px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    margin-bottom: 16px;
}
.over-emoji { font-size: 56px; margin-bottom: 8px; }
.over-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; color: #fff; }
.over-sub { color: #fda4af; font-size: 12px; letter-spacing: 1px; margin-bottom: 16px; }
.over-result {
    background: rgba(0,0,0,0.3);
    border-radius: 14px;
    padding: 14px;
    text-align: left;
    margin-bottom: 14px;
}
.over-result-label { font-size: 10px; letter-spacing: 1.5px; color: #fda4af; margin-bottom: 6px; }
.over-result-q { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #fff; line-height: 1.4; }
.over-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 6px;
}
.over-row.you { background: rgba(248,113,113,0.18); color: #fecaca; border: 1px solid rgba(248,113,113,0.4); }
.over-row.past { background: rgba(34,197,94,0.18); color: #bbf7d0; border: 1px solid rgba(34,197,94,0.4); }
.over-row strong { font-weight: 800; }
.over-row .lab { font-size: 9px; letter-spacing: 1px; opacity: 0.8; min-width: 56px; flex-shrink: 0; }
.over-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 18px;
}
.over-stat {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
}
.over-stat-label { font-size: 10px; letter-spacing: 1.2px; color: #b8b3d8; margin-bottom: 3px; }
.over-stat-value { font-size: 22px; font-weight: 800; }
.over-stat.score .over-stat-value { color: #fbbf24; }
.over-stat.best  .over-stat-value { color: #f472b6; }
.over-best-tag {
    display: inline-block;
    margin-top: 6px;
    padding: 3px 9px;
    background: rgba(251,191,36,0.2);
    color: #fde68a;
    border: 1px solid rgba(251,191,36,0.5);
    border-radius: 999px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 1.5px;
}

.again-btn {
    display: block;
    width: 100%;
    padding: 16px 20px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #c084fc 0%, #f472b6 60%, #fb923c 100%);
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(192,132,252,0.35);
    transition: transform 0.12s;
}
.again-btn:active { transform: scale(0.97); }
.home-btn {
    display: block;
    width: 100%;
    margin-top: 8px;
    padding: 12px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.18);
    color: #c9bfee;
    font-size: 13px;
    font-weight: 700;
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
}
.home-btn:active { background: rgba(255,255,255,0.05); }

/* burden indicator on later rounds */
.burden-msg {
    text-align: center;
    margin-top: 8px;
    font-size: 11px;
    color: #c4b5fd;
    letter-spacing: 0.5px;
    min-height: 14px;
}
.burden-msg.heavy { color: #fbbf24; }
.burden-msg.crisis { color: #f87171; animation: throb 1.2s ease-in-out infinite; }
@keyframes throb { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* footer */
.footer {
    text-align: center;
    padding: 20px 12px 8px;
    color: #6c5fa3;
    font-size: 10px;
    letter-spacing: 0.5px;
}
.footer a { color: #8b80b8; text-decoration: none; }
</style>
</head>
<body>
<div class="stars"></div>

<div class="topbar">
    <div class="title-block">
        <div class="title-mark">🧠</div>
        <div>
            <div class="title-text" id="appTitle">キオクイズ</div>
            <div class="title-sub">KIOKUIZ</div>
        </div>
    </div>
    <div class="topbtns">
        <button class="icon-btn lang-pill" id="langBtn">JP</button>
        <button class="icon-btn" id="homeBtn" title="home">🏠</button>
    </div>
</div>

<!-- ── Home screen ── -->
<div class="screen active" id="homeScreen">
    <div class="hero">
        <div class="hero-mark">🧠</div>
        <h1 class="hero-title"><span class="accent" id="heroTitle">キオクイズ</span></h1>
        <div class="hero-tag" id="heroTag">あなたの「好み」が、いつしか「問題」になる</div>
    </div>
    <div class="rules">
        <div class="rules-title" id="rulesTitle">ルール</div>
        <div class="rule">
            <div class="rule-icon kioku">記</div>
            <div id="rule1"><strong>キオクフェーズ</strong>では、4択から自分の好みを答える。</div>
        </div>
        <div class="rule">
            <div class="rule-icon quiz">問</div>
            <div id="rule2"><strong>クイズフェーズ</strong>では、過去の自分の答えを思い出す。</div>
        </div>
        <div class="rule">
            <div class="rule-icon bad">×</div>
            <div id="rule3">過去の自分を間違えたら<strong>終了</strong>。</div>
        </div>
        <div class="rule">
            <div class="rule-icon">∞</div>
            <div id="rule4">続けるほど、覚える「好み」が積み重なっていく。</div>
        </div>
    </div>
    <button class="start-btn" id="startBtn">スタート</button>
    <div class="best-score-line" id="bestScoreLine"></div>
</div>

<!-- ── Game screen ── -->
<div class="screen" id="gameScreen">
    <div class="game-stats">
        <div class="stat-cell">
            <div class="stat-label" id="statBrainLabel">記憶</div>
            <div class="stat-value brain" id="statBrain">0</div>
        </div>
        <div class="stat-cell">
            <div class="stat-label" id="statScoreLabel">スコア</div>
            <div class="stat-value score" id="statScore">0</div>
        </div>
        <div class="stat-cell">
            <div class="stat-label" id="statBestLabel">ベスト</div>
            <div class="stat-value best" id="statBest">0</div>
        </div>
    </div>
    <div class="phase-card kioku" id="phaseCard">
        <div class="phase-badge" id="phaseBadge">記 キオク</div>
        <div class="phase-hint" id="phaseHint">あなたの好みを選んでください</div>
        <div class="question" id="questionText">―</div>
        <div class="choices" id="choices"></div>
    </div>
    <div class="burden-msg" id="burdenMsg"></div>
</div>

<!-- ── Game over screen ── -->
<div class="screen" id="overScreen">
    <div class="over-card">
        <div class="over-emoji">💔</div>
        <div class="over-title" id="overTitle">記憶ロスト</div>
        <div class="over-sub" id="overSub">過去の自分とすれ違った</div>
        <div class="over-result" id="overResult"></div>
    </div>
    <div class="over-stats">
        <div class="over-stat score">
            <div class="over-stat-label" id="overStatScoreLabel">スコア</div>
            <div class="over-stat-value" id="overStatScore">0</div>
        </div>
        <div class="over-stat best">
            <div class="over-stat-label" id="overStatBestLabel">ベスト</div>
            <div class="over-stat-value" id="overStatBest">0</div>
        </div>
    </div>
    <div id="bestBadgeWrap" style="text-align:center; margin-bottom: 14px; display:none;">
        <span class="over-best-tag" id="bestBadge">★ NEW BEST</span>
    </div>
    <button class="again-btn" id="againBtn">もう一度</button>
    <button class="home-btn" id="overHomeBtn">ホーム</button>
</div>

<div class="footer">
    <a href="https://pndshch.github.io/" target="_blank">← Pinda Lab</a>
</div>

<script>
// ════════════════════════════════════════════
//   Question pool — each question has 4 choices
//   q  = question text  (ja / en)
//   c  = 4 choices      (ja / en, same order)
// ════════════════════════════════════════════
const QUESTIONS = [
    // ── 食 ──
    { q:{ja:"朝ごはんで食べたいのは？", en:"Breakfast of choice?"},
      c:[{ja:"ごはん",en:"Rice"},{ja:"パン",en:"Bread"},{ja:"シリアル",en:"Cereal"},{ja:"食べない",en:"Skip it"}] },
    { q:{ja:"ラーメン派は？", en:"Ramen broth?"},
      c:[{ja:"醤油",en:"Shōyu"},{ja:"味噌",en:"Miso"},{ja:"塩",en:"Shio"},{ja:"豚骨",en:"Tonkotsu"}] },
    { q:{ja:"お寿司で最初に食べる？", en:"First sushi to grab?"},
      c:[{ja:"マグロ",en:"Tuna"},{ja:"サーモン",en:"Salmon"},{ja:"イカ",en:"Squid"},{ja:"たまご",en:"Tamago"}] },
    { q:{ja:"カレーは？", en:"Curry spice?"},

// ════════════════════════════════════════════
//   State
// ════════════════════════════════════════════
let lang = 'ja';
let memoryBank = [];     // [{qIdx, choiceIdx}] — choiceIdx is canonical (0..3 into q.c)
let usedKiokuQs = new Set(); // qIdx already used in kioku
let score = 0;
let best = 0;
let phase = 'kioku';     // 'kioku' | 'quiz'
let currentQIdx = null;
let currentMemoryIdx = null; // index in memoryBank when in quiz phase
let displayOrder = [0,1,2,3]; // shuffled each round: displayPosition → canonical idx
let acceptInput = true;

function shuffle4() {
    const a = [0,1,2,3];
    for (let i = 3; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

const $ = id => document.getElementById(id);

function loadBest() {
    try {
        const v = parseInt(localStorage.getItem('kiokuiz-best') || '0', 10);
        return isNaN(v) ? 0 : v;
    } catch (e) { return 0; }
}
function saveBest(n) {
    try { localStorage.setItem('kiokuiz-best', String(n)); } catch (e) {}
}
function loadLang() {
    try {
        const stored = localStorage.getItem('kiokuiz-lang');
        if (stored === 'ja' || stored === 'en') return stored;
    } catch (e) {}
    const nav = (navigator.language || 'ja').toLowerCase();
    return nav.startsWith('ja') ? 'ja' : 'en';
}
function saveLang(l) { try { localStorage.setItem('kiokuiz-lang', l); } catch (e) {} }

function applyLang(newLang) {
    lang = newLang;
    saveLang(lang);
    const t = I18N[lang];
    document.documentElement.lang = lang;

    $('appTitle').textContent = t.appTitle;
    $('heroTitle').textContent = t.heroTitle;
    $('heroTag').textContent = t.heroTag;
    $('rulesTitle').textContent = t.rulesTitle;
    $('rule1').innerHTML = t.rule1Html;
    $('rule2').innerHTML = t.rule2Html;
    $('rule3').innerHTML = t.rule3Html;
    $('rule4').innerHTML = t.rule4Html;
    $('startBtn').textContent = t.startBtn;
    $('againBtn').textContent = t.againBtn;
    $('overHomeBtn').textContent = t.homeBtn;
    $('statBrainLabel').textContent = t.statBrainLabel;
    $('statScoreLabel').textContent = t.statScoreLabel;
    $('statBestLabel').textContent = t.statBestLabel;
    $('overStatScoreLabel').textContent = t.overStatScoreLabel;
    $('overStatBestLabel').textContent = t.overStatBestLabel;
    $('bestBadge').textContent = t.bestBadge;
    $('overTitle').textContent = t.overTitle;
    $('overSub').textContent = t.overSub;

    $('langBtn').textContent = lang === 'ja' ? 'EN' : 'JP';
    updateBestLine();
    if ($('gameScreen').classList.contains('active')) renderQuestion();
}

function updateBestLine() {
    const t = I18N[lang];
    $('bestScoreLine').textContent = best > 0 ? t.bestFmt(best) : t.bestBlank;
}

// ════════════════════════════════════════════
//   Game
// ════════════════════════════════════════════
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'instant' });
}

function startGame() {
    memoryBank = [];
    usedKiokuQs = new Set();
    score = 0;
    phase = 'kioku';
    acceptInput = true;
    showScreen('gameScreen');
    nextRound();
}

function pickKiokuQuestion() {
    // pick a question that hasn't been used yet
    const available = [];
    for (let i = 0; i < QUESTIONS.length; i++) {
        if (!usedKiokuQs.has(i)) available.push(i);
    }
    if (available.length === 0) return null;
    return available[Math.floor(Math.random() * available.length)];
}

function decidePhase() {
    // round count based on score+1
    const round = score + 1;
    // forced kioku for first 2 rounds
    if (round <= 2) return 'kioku';
    // can't quiz with empty memory
    if (memoryBank.length === 0) return 'kioku';
    // can't kioku if no questions left
    if (usedKiokuQs.size >= QUESTIONS.length) return 'quiz';
    // 50/50 random thereafter — slight quiz bias as memory grows for difficulty
    const quizProb = Math.min(0.65, 0.45 + memoryBank.length * 0.01);
    return Math.random() < quizProb ? 'quiz' : 'kioku';
}

function nextRound() {
    phase = decidePhase();
    if (phase === 'kioku') {
        currentQIdx = pickKiokuQuestion();
        currentMemoryIdx = null;
    } else {
        // pick random memory
        currentMemoryIdx = Math.floor(Math.random() * memoryBank.length);
        currentQIdx = memoryBank[currentMemoryIdx].qIdx;
    }
    displayOrder = shuffle4();
    renderQuestion();
}

function renderQuestion() {
    const t = I18N[lang];
    const card = $('phaseCard');
    card.classList.toggle('kioku', phase === 'kioku');
    card.classList.toggle('quiz',  phase === 'quiz');
    $('phaseBadge').textContent = phase === 'kioku' ? t.phaseKioku : t.phaseQuiz;
    $('phaseHint').textContent = phase === 'kioku' ? t.hintKioku : t.hintQuiz;

    const q = QUESTIONS[currentQIdx];
    $('questionText').textContent = q.q[lang];

    const choicesEl = $('choices');
    choicesEl.innerHTML = '';
    displayOrder.forEach((canonicalIdx, displayPos) => {
        const choice = q.c[canonicalIdx];
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.innerHTML = '<span class="choice-num">'+(displayPos+1)+'</span><span>'+escapeHtml(choice[lang])+'</span>';
        btn.addEventListener('click', () => onChoice(canonicalIdx, btn));
        choicesEl.appendChild(btn);
    });

    $('statBrain').textContent = memoryBank.length;
    $('statScore').textContent = score;
    $('statBest').textContent = best;

    // burden message
    const bm = $('burdenMsg');
    bm.classList.remove('heavy', 'crisis');
    if (memoryBank.length >= 18) {
        bm.textContent = t.burdenCrisis; bm.classList.add('crisis');
    } else if (memoryBank.length >= 12) {
        bm.textContent = t.burdenHeavy; bm.classList.add('heavy');
    } else if (memoryBank.length >= 6) {
        bm.textContent = t.burdenMedium;
    } else {
        bm.textContent = t.burdenLight;
    }
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]
    ));
}

function onChoice(idx, btn) {
    if (!acceptInput) return;
    acceptInput = false;

    if (phase === 'kioku') {
        // record memory
        memoryBank.push({ qIdx: currentQIdx, choiceIdx: idx });
        usedKiokuQs.add(currentQIdx);
        btn.classList.add('correct');
        score++;
        // animate brain count
        $('statBrain').textContent = memoryBank.length;
        $('statScore').textContent = score;
        setTimeout(() => {
            acceptInput = true;
            nextRound();
        }, 580);
    } else {
        const correctIdx = memoryBank[currentMemoryIdx].choiceIdx;
        if (idx === correctIdx) {
            btn.classList.add('correct');
            score++;
            $('statScore').textContent = score;
            setTimeout(() => {
                acceptInput = true;
                nextRound();
            }, 580);
        } else {
            btn.classList.add('wrong');
            // reveal the correct one — choices array is in displayOrder
            const choices = $('choices').children;
            for (let i = 0; i < choices.length; i++) {
                const ci = displayOrder[i];
                if (ci === correctIdx) choices[i].classList.add('correct');
                else if (ci !== idx) choices[i].classList.add('dim');
            }
            // game over
            setTimeout(() => gameOver(idx, correctIdx), 1100);
        }
    }
}

function gameOver(yourIdx, pastIdx) {
    const t = I18N[lang];
    const isNewBest = score > best;
    if (isNewBest) {
        best = score;
        saveBest(best);
    }

    // build the comparison
    const q = QUESTIONS[currentQIdx];
    $('overResult').innerHTML =
        '<div class="over-result-label">'+escapeHtml(t.overResultLabel)+'</div>'+
        '<div class="over-result-q">'+escapeHtml(q.q[lang])+'</div>'+
        '<div class="over-row past"><span class="lab">'+escapeHtml(t.overPastLabel)+'</span><strong>'+escapeHtml(q.c[pastIdx][lang])+'</strong></div>'+
        '<div class="over-row you"><span class="lab">'+escapeHtml(t.overYouLabel)+'</span><strong>'+escapeHtml(q.c[yourIdx][lang])+'</strong></div>';

    $('overStatScore').textContent = score;
    $('overStatBest').textContent = best;
    $('bestBadgeWrap').style.display = isNewBest && score > 0 ? 'block' : 'none';

    showScreen('overScreen');
    updateBestLine();
}

// ════════════════════════════════════════════
//   Init
// ════════════════════════════════════════════
function init() {
    best = loadBest();
    applyLang(loadLang());
    updateBestLine();

    $('startBtn').addEventListener('click', startGame);
    $('againBtn').addEventListener('click', startGame);
    $('overHomeBtn').addEventListener('click', () => showScreen('homeScreen'));
    $('homeBtn').addEventListener('click', () => showScreen('homeScreen'));
    $('langBtn').addEventListener('click', () => applyLang(lang === 'ja' ? 'en' : 'ja'));
}

init();
</script>
