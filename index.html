<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>キオクイズ — Memory Runner</title>
<meta name="description" content="走って覚える、走って答える。3レーンのメモリーランナー。ゲートを通り抜けると記憶になり、やがてクイズゲートが立ちはだかる。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0420;font-family:'Helvetica Neue',Arial,sans-serif;color:#e8d8ff;touch-action:none;user-select:none;-webkit-user-select:none}

/* ── Title Screen ── */
#title-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 35%,#3a1a6a 0%,#1a0a3a 50%,#0a0420 100%);z-index:100;transition:opacity 0.8s;padding:20px}
#title-screen.hidden{opacity:0;pointer-events:none}
.title-main{font-size:clamp(40px,9vw,82px);font-weight:900;letter-spacing:4px;color:#d8b8ff;text-shadow:0 0 50px rgba(180,140,255,0.6)}
.title-sub{font-size:clamp(13px,3vw,18px);color:#9070c0;margin-top:6px;letter-spacing:6px;font-weight:300}
.title-tag{font-size:clamp(14px,3.2vw,20px);color:#b48cff;margin-top:34px;letter-spacing:1px;font-weight:600;text-align:center}
.title-desc{max-width:480px;text-align:center;font-size:clamp(12px,2.6vw,14px);color:#7a6090;line-height:1.9;margin:18px 10px 0}
.title-start{margin-top:38px;padding:16px 56px;background:none;border:2px solid #b48cff;border-radius:60px;color:#d8b8ff;font-size:16px;font-weight:700;letter-spacing:4px;cursor:pointer;transition:all 0.3s}
.title-start:hover,.title-start:active{background:#b48cff;color:#1a0a3a;box-shadow:0 0 30px rgba(180,140,255,0.5)}
.lang-toggle{position:absolute;top:14px;right:14px;background:none;border:1px solid #4a3060;color:#9070c0;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer}
.title-symbols{display:flex;gap:14px;margin-top:24px;font-size:24px;opacity:0.4;animation:driftSym 6s ease-in-out infinite}
@keyframes driftSym{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── Game UI ── */
#game-container{position:absolute;inset:0;display:none;flex-direction:column}
#game-container.active{display:flex}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0d0524;border-bottom:1px solid #2a1850;flex-shrink:0;gap:8px;flex-wrap:wrap}
.hud-stat{display:flex;align-items:center;gap:5px;font-size:13px;color:#b48cff;font-weight:700;white-space:nowrap}
.hud-icon{font-size:16px}
.hud-lives{color:#ff8090}

#game-canvas{flex:1 1 0;min-height:0;width:100%;display:block;cursor:pointer}

.bottom-hint{padding:8px 14px;background:#0d0524;border-top:1px solid #2a1850;text-align:center;font-size:11px;color:#5a4a78;flex-shrink:0;letter-spacing:1px}

/* ── Result Screen ── */
#result-screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,4,32,0.96);z-index:200;padding:20px;text-align:center}
#result-screen.active{display:flex}
.result-title{font-size:clamp(28px,6vw,44px);font-weight:900;color:#d8b8ff;margin-bottom:8px;letter-spacing:2px}
.result-subtitle{font-size:14px;color:#7a6090;margin-bottom:28px;max-width:380px;line-height:1.7}
.result-stats{display:flex;gap:24px;margin-bottom:28px;flex-wrap:wrap;justify-content:center}
.result-stat{text-align:center}
.result-stat-val{font-size:32px;font-weight:900;color:#b48cff}
.result-stat-lbl{font-size:11px;color:#5a4a78;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.insight-box{max-width:460px;background:#1a0a3a;border:1px solid #3a2060;border-radius:14px;padding:18px 22px;margin-bottom:24px}
.insight-text{font-size:13px;color:#b48cff;line-height:1.9}
.result-btn{padding:14px 44px;background:none;border:2px solid #b48cff;border-radius:50px;color:#d8b8ff;font-size:14px;font-weight:700;letter-spacing:3px;cursor:pointer}
.result-btn:hover,.result-btn:active{background:#b48cff;color:#1a0a3a}

/* ── Tutorial overlay ── */
.tutorial{position:absolute;inset:0;background:rgba(10,4,32,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:150;padding:24px;text-align:center}
.tutorial.hidden{display:none}
.tut-step{max-width:420px}
.tut-step h3{font-size:22px;color:#d8b8ff;margin-bottom:14px;letter-spacing:1px}
.tut-step p{font-size:13px;color:#9070c0;line-height:1.9;margin-bottom:22px;white-space:pre-line}
.tut-next{padding:11px 36px;background:none;border:1px solid #b48cff;border-radius:30px;color:#d8b8ff;font-size:13px;cursor:pointer;letter-spacing:2px}
.tut-next:hover,.tut-next:active{background:#b48cff;color:#1a0a3a}
.tut-icons{font-size:36px;letter-spacing:18px;margin-bottom:18px;opacity:0.8}
</style>
</head>
<body>

<!-- ── Title Screen ── -->
<div id="title-screen">
    <button class="lang-toggle" onclick="toggleLang()" id="lang-btn">EN</button>
    <div class="title-main" data-i="titleMain">キオクイズ</div>
    <div class="title-sub" data-i="titleSub">MEMORY RUNNER</div>
    <div class="title-symbols">🐱 🌙 🍎 ⚡ 🌸</div>
    <div class="title-tag" data-i="titleTag">走って覚える、走って答える。</div>
    <div class="title-desc" data-i="titleDesc">3つのレーンを駆け抜けながら、ゲートに浮かぶ記号を記憶する。やがて立ちはだかるクイズゲートで、覚えた記号を選び抜け。</div>
    <button class="title-start" onclick="startGame()" data-i="titleStart">はじめる</button>
</div>

<!-- ── Game Container ── -->
<div id="game-container">
    <div class="top-bar">
        <div class="hud-stat hud-lives"><span class="hud-icon">❤️</span><span id="hud-lives">×3</span></div>
        <div class="hud-stat"><span class="hud-icon">⭐</span><span data-i="hudScore">SCORE</span><span id="hud-score">0</span></div>
        <div class="hud-stat"><span class="hud-icon">🔥</span><span data-i="hudCombo">COMBO</span><span id="hud-combo">0</span></div>
        <div class="hud-stat"><span class="hud-icon">📏</span><span id="hud-level">Lv.1</span></div>
    </div>
    <canvas id="game-canvas"></canvas>
    <div class="bottom-hint" data-i="hint">← 左タップ／右タップ →</div>
</div>

<!-- ── Tutorial ── -->
<div class="tutorial hidden" id="tutorial">
    <div class="tut-step" id="tut-content"></div>
</div>

<!-- ── Result Screen ── -->
<div id="result-screen">
    <div class="result-title" id="result-title"></div>
    <div class="result-subtitle" id="result-subtitle"></div>
    <div class="result-stats" id="result-stats"></div>
    <div class="insight-box">
        <div class="insight-text" id="insight-text"></div>
    </div>
    <button class="result-btn" onclick="restartGame()" data-i="resultRestart">もう一度</button>
</div>

<script>
// ══════════════════════════════════════════════
//  キオクイズ — Memory Runner
//  Pass memory gates to remember; choose the right
//  door at quiz gates to advance.
// ══════════════════════════════════════════════

let LANG = 'ja';
const I18N = {
ja: {
    titleMain: 'キオクイズ',
    titleSub: 'MEMORY RUNNER',
    titleTag: '走って覚える、走って答える。',
    titleDesc: '3つのレーンを駆け抜けながら、ゲートに浮かぶ記号を記憶する。やがて立ちはだかるクイズゲートで、覚えた記号を選び抜け。',
    titleStart: 'はじめる',
    hudScore: 'SCORE',
    hudCombo: 'COMBO',
    hint: '← 左タップ／右タップ →',
    tutStep1Title: '走って、覚える',
    tutStep1Text: '青いゲートを通り抜けると、その記号が記憶になる。\n走り続けるうちに、頭の中にいくつもの記号が積まれていく。',
    tutStep1Btn: '次へ',
    tutStep2Title: 'クイズゲートで答える',
    tutStep2Text: 'やがてクイズゲートが現れる。3つのドアにはそれぞれ違う記号。\n上に出る問いに合うドアを選んで通り抜けよう。\n間違えるとライフが1つ減る。',
    tutStep2Btn: 'はじめる',
    qFirst: '最初に見たのは？',
    qLast: '直前に見たのは？',
    qSaw: '見た記号は？',
    qNotSaw: '見ていない記号は？',
    qNth: (n) => `${n}番目に見たのは？`,
    correct: '正解！',
    wrong: '不正解…',
    resultTitle: 'ゲームオーバー',
    resultSubtitle: '記憶の道は、ここまで。',
    statScore: 'スコア',
    statCombo: '最大コンボ',
    statDistance: '走った距離',
    statLevel: 'レベル',
    insight: '記憶は、通り抜けた数より、選んだ瞬間の確かさで磨かれる。すぐ忘れたって、また走ればいい。',
    resultRestart: 'もう一度',
    levelUp: 'LEVEL UP',
},
en: {
    titleMain: 'KIOKUIZ',
    titleSub: 'MEMORY RUNNER',
    titleTag: 'Run to remember. Run to answer.',
    titleDesc: 'Sprint down three lanes and memorize the symbols floating in each gate. Eventually a quiz gate blocks the path — pick the door that matches the question.',
    titleStart: 'BEGIN',
    hudScore: 'SCORE',
    hudCombo: 'COMBO',
    hint: '← TAP LEFT / TAP RIGHT →',
    tutStep1Title: 'Run and remember',
    tutStep1Text: 'Pass through a blue gate and its symbol becomes a memory.\nThe further you run, the more symbols pile up in your head.',
    tutStep1Btn: 'Next',
    tutStep2Title: 'The quiz gate',
    tutStep2Text: 'Soon a quiz gate appears. Three doors, three different symbols.\nMatch the question above and pick the right door.\nA wrong door costs a life.',
    tutStep2Btn: 'Begin',
    qFirst: 'Which did you see FIRST?',
    qLast: 'Which did you see LAST?',
    qSaw: 'Which one DID you see?',
    qNotSaw: 'Which did you NOT see?',
    qNth: (n) => `Which was #${n}?`,
    correct: 'CORRECT!',
    wrong: 'MISS…',
    resultTitle: 'RUN ENDED',
    resultSubtitle: 'The road of memory ends here.',
    statScore: 'Score',
    statCombo: 'Best combo',
    statDistance: 'Distance',
    statLevel: 'Level',
    insight: 'Memory is sharpened not by what you pass through, but by the certainty of the moment you choose. Forget — and run again.',
    resultRestart: 'Replay',
    levelUp: 'LEVEL UP',
}
};

function t(key, ...args) {
    const v = (I18N[LANG] || I18N.ja)[key];
    if (typeof v === 'function') return v(...args);
    return v || key;
}

function toggleLang() {
    LANG = LANG === 'ja' ? 'en' : 'ja';
    document.getElementById('lang-btn').textContent = LANG === 'ja' ? 'EN' : 'JA';
    applyI18n();
}

function applyI18n() {
    document.querySelectorAll('[data-i]').forEach(el => {
        const key = el.getAttribute('data-i');
        const v = I18N[LANG][key];
        if (typeof v === 'string') el.textContent = v;
    });
}

// ══════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════

const SYMBOLS = ['🐱','🐶','🦊','🐻','🐼','🐸','🐢','🐧','🦉','🌙','⭐','☀️','⚡','❄️','🔥','🍎','🍇','🍒','🌸','🌻','🍀','🎵','🎯','⚓'];
const LANE_COUNT = 3;
const GATE_GAP = 260;

// ══════════════════════════════════
//  STATE
// ══════════════════════════════════

let canvas, ctx, animId;
let state = null;

function initState() {
    return {
        score: 0,
        lives: 3,
        combo: 0,
        bestCombo: 0,
        distance: 0,
        speed: 230,
        level: 1,
        gates: [],
        memoryQueue: [],
        queueMaxSize: 5,
        memoriesUntilQuiz: 3,
        memoryCounter: 0,
        quizzesSolved: 0,
        spawnY: -160,
        player: { lane: 1, targetLane: 1, x: 0, y: 0, bob: 0 },
        flash: null,
        toasts: [],
        gameOver: false,
        levelUpTimer: 0,
    };
}

// ══════════════════════════════════
//  CANVAS
// ══════════════════════════════════

function resizeCanvas() {
    if (!canvas) return;
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (state) state.player.x = laneX(state.player.targetLane);
}

function laneX(lane) {
    const tb = trackBounds();
    return tb.left + tb.laneW * (lane + 0.5);
}

function trackBounds() {
    const w = canvas.clientWidth;
    const trackW = Math.min(w * 0.86, 540);
    const left = (w - trackW) / 2;
    return { left, right: left + trackW, width: trackW, laneW: trackW / LANE_COUNT };
}

function playerY() {
    return canvas.clientHeight - 80;
}

// ══════════════════════════════════
//  GATE SPAWNING
// ══════════════════════════════════

function spawnMemoryGate() {
    let sym;
    let tries = 0;
    do {
        sym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
        tries++;
    } while (state.memoryQueue.includes(sym) && tries < 10);
    state.gates.push({
        type: 'memory',
        y: state.spawnY,
        symbol: sym,
        passed: false,
    });
}

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function spawnQuizGate() {
    // Options & correct answer are generated at reveal time so they
    // match the player's actual memory window when the gate appears.
    state.gates.push({
        type: 'quiz',
        y: state.spawnY,
        qType: null,
        qData: null,
        options: null,
        correctIndex: -1,
        passed: false,
        revealed: false,
    });
}

function generateQuiz(gate) {
    const queue = state.memoryQueue.slice();
    if (queue.length < 3) {
        // fallback: not enough memory yet, make an easy "saw" quiz
        const correct = queue[queue.length - 1] || SYMBOLS[0];
        const notSeen = SYMBOLS.filter(s => !queue.includes(s));
        shuffle(notSeen);
        gate.qType = 'last';
        gate.qData = {};
        gate.options = shuffle([correct, notSeen[0], notSeen[1]]);
        gate.correctIndex = gate.options.indexOf(correct);
        return;
    }

    const types = ['first', 'last'];
    if (state.level >= 2) types.push('saw', 'notSaw');
    if (state.level >= 3 && queue.length >= 4) types.push('nth');
    const qType = types[Math.floor(Math.random() * types.length)];

    let correct, options, qData = {};

    if (qType === 'first') {
        correct = queue[0];
        options = pickThree(correct, queue);
    } else if (qType === 'last') {
        correct = queue[queue.length - 1];
        options = pickThree(correct, queue);
    } else if (qType === 'nth') {
        const n = 2 + Math.floor(Math.random() * Math.max(1, queue.length - 2));
        correct = queue[n - 1];
        options = pickThree(correct, queue);
        qData.n = n;
    } else if (qType === 'saw') {
        correct = queue[Math.floor(Math.random() * queue.length)];
        const notSeen = SYMBOLS.filter(s => !queue.includes(s));
        shuffle(notSeen);
        options = shuffle([correct, notSeen[0], notSeen[1]]);
    } else { // notSaw
        const notSeen = SYMBOLS.filter(s => !queue.includes(s));
        shuffle(notSeen);
        correct = notSeen[0];
        const seen = queue.filter((v, i, a) => a.indexOf(v) === i);
        shuffle(seen);
        let opt2 = seen[0], opt3 = seen[1];
        if (!opt3 || opt2 === opt3) opt3 = notSeen[1] || SYMBOLS.find(s => s !== correct && s !== opt2);
        options = shuffle([correct, opt2, opt3]);
    }

    gate.qType = qType;
    gate.qData = qData;
    gate.options = options;
    gate.correctIndex = options.indexOf(correct);
}

function pickThree(correct, queue) {
    const opts = [correct];
    const others = queue.filter(s => s !== correct);
    shuffle(others);
    while (opts.length < 3 && others.length) opts.push(others.shift());
    while (opts.length < 3) {
        const r = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
        if (!opts.includes(r)) opts.push(r);
    }
    return shuffle(opts);
}

function questionText(gate) {
    if (gate.qType === 'first') return t('qFirst');
    if (gate.qType === 'last') return t('qLast');
    if (gate.qType === 'saw') return t('qSaw');
    if (gate.qType === 'notSaw') return t('qNotSaw');
    if (gate.qType === 'nth') return t('qNth', gate.qData.n);
    return '?';
}

// ══════════════════════════════════
//  GATE PASS / OUTCOMES
// ══════════════════════════════════

function onGatePass(gate) {
    if (gate.type === 'memory') {
        state.memoryQueue.push(gate.symbol);
        if (state.memoryQueue.length > state.queueMaxSize) state.memoryQueue.shift();
        addToast('+' + gate.symbol, '#80c0ff');
    } else {
        const lane = state.player.lane;
        const correct = lane === gate.correctIndex;
        if (correct) {
            state.score++;
            state.combo++;
            state.bestCombo = Math.max(state.bestCombo, state.combo);
            state.flash = { color: '#80f090', t: 0.45 };
            addToast(t('correct'), '#80f090');
            state.quizzesSolved++;
            if (state.quizzesSolved % 3 === 0) {
                state.level++;
                state.speed = Math.min(420, state.speed + 28);
                state.queueMaxSize = Math.min(7, state.queueMaxSize + 1);
                state.memoriesUntilQuiz = Math.min(6, state.memoriesUntilQuiz + 1);
                state.levelUpTimer = 1.4;
            }
        } else {
            state.lives--;
            state.combo = 0;
            state.flash = { color: '#ff5070', t: 0.55 };
            addToast(t('wrong') + ' ' + gate.options[gate.correctIndex], '#ff5070');
            if (state.lives <= 0) {
                setTimeout(() => endGame(), 700);
            }
        }
    }
    updateHUD();
}

function addToast(text, color) {
    state.toasts.push({ text, color, y: 0, life: 1.6, vy: -28 });
}

// ══════════════════════════════════
//  INPUT
// ══════════════════════════════════

function moveLane(dir) {
    if (!state || state.gameOver) return;
    state.player.targetLane = Math.max(0, Math.min(LANE_COUNT - 1, state.player.targetLane + dir));
}

function setLane(lane) {
    if (!state || state.gameOver) return;
    state.player.targetLane = Math.max(0, Math.min(LANE_COUNT - 1, lane));
}

function setupInput() {
    if (setupInput._done) return;
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLane(-1);
        else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveLane(1);
    });

    let downX = null;
    canvas.addEventListener('pointerdown', (e) => { downX = e.clientX; });
    canvas.addEventListener('pointerup', (e) => {
        if (downX === null) return;
        const dx = e.clientX - downX;
        if (Math.abs(dx) > 30) {
            moveLane(dx > 0 ? 1 : -1);
        } else {
            const rect = canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const third = rect.width / 3;
            if (px < third) setLane(0);
            else if (px > 2 * third) setLane(2);
            else setLane(1);
        }
        downX = null;
    });
    canvas.addEventListener('pointercancel', () => { downX = null; });
    setupInput._done = true;
}

// ══════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════

let lastTime = 0;
function loop(time) {
    if (!state || state.gameOver) return;
    const dt = Math.min(0.05, lastTime === 0 ? 0.016 : (time - lastTime) / 1000);
    lastTime = time;
    update(dt);
    render();
    animId = requestAnimationFrame(loop);
}

function update(dt) {
    state.distance += state.speed * dt;

    state.gates.forEach(g => { g.y += state.speed * dt; });

    // Ensure 4+ gates ahead of player
    while (state.gates.filter(g => !g.passed).length < 4) {
        const topMost = state.gates.length
            ? Math.min(...state.gates.map(g => g.y))
            : 100;
        state.spawnY = topMost - GATE_GAP;
        const queueReady = state.memoryQueue.length >= 3;
        const isQuiz = queueReady && state.memoryCounter >= state.memoriesUntilQuiz;
        if (isQuiz) {
            spawnQuizGate();
            state.memoryCounter = 0;
        } else {
            spawnMemoryGate();
            state.memoryCounter++;
        }
    }

    // Lane animation
    const tx = laneX(state.player.targetLane);
    state.player.x += (tx - state.player.x) * Math.min(1, dt * 14);
    state.player.lane = state.player.targetLane;
    state.player.bob += dt * 11;

    // Detect gate pass
    const py = playerY();
    state.gates.forEach(g => {
        if (g.passed) return;
        if (g.y >= py + 6) {
            g.passed = true;
            onGatePass(g);
        } else if (g.type === 'quiz' && !g.revealed && g.y > py - 380) {
            generateQuiz(g);
            g.revealed = true;
        }
    });

    state.gates = state.gates.filter(g => g.y < canvas.clientHeight + 200);

    if (state.flash) {
        state.flash.t -= dt;
        if (state.flash.t <= 0) state.flash = null;
    }
    state.toasts.forEach(tt => { tt.life -= dt; tt.y += tt.vy * dt; });
    state.toasts = state.toasts.filter(tt => tt.life > 0);
    if (state.levelUpTimer > 0) state.levelUpTimer -= dt;
}

// ══════════════════════════════════
//  RENDER
// ══════════════════════════════════

function render() {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    const tb = trackBounds();

    // Background
    const grd = ctx.createLinearGradient(0, 0, 0, h);
    grd.addColorStop(0, '#1a0a3a');
    grd.addColorStop(1, '#0a0420');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, w, h);

    drawStars();

    // Track
    ctx.fillStyle = 'rgba(40,20,80,0.55)';
    ctx.fillRect(tb.left, 0, tb.width, h);
    ctx.fillStyle = '#5a3090';
    ctx.fillRect(tb.left - 2, 0, 2, h);
    ctx.fillRect(tb.right, 0, 2, h);

    // Lane separator dashes (scrolling downward)
    ctx.strokeStyle = 'rgba(180,140,255,0.25)';
    ctx.lineWidth = 2;
    ctx.setLineDash([14, 14]);
    const offset = (state.distance % 28);
    for (let i = 1; i < LANE_COUNT; i++) {
        const x = tb.left + tb.laneW * i;
        ctx.beginPath();
        ctx.moveTo(x, -28 + offset);
        ctx.lineTo(x, h);
        ctx.stroke();
    }
    ctx.setLineDash([]);

    // Highlight current lane (subtle)
    const curX = laneX(state.player.targetLane);
    const lg = ctx.createLinearGradient(0, 0, 0, h);
    lg.addColorStop(0, 'rgba(180,140,255,0)');
    lg.addColorStop(1, 'rgba(180,140,255,0.12)');
    ctx.fillStyle = lg;
    ctx.fillRect(curX - tb.laneW / 2, 0, tb.laneW, h);

    state.gates.forEach(g => drawGate(g));
    drawPlayer();

    // Toasts
    state.toasts.forEach(tt => {
        ctx.globalAlpha = Math.min(1, tt.life);
        ctx.fillStyle = tt.color;
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(tt.text, w / 2, h * 0.42 + tt.y);
    });
    ctx.globalAlpha = 1;

    if (state.flash) {
        ctx.fillStyle = state.flash.color;
        ctx.globalAlpha = Math.min(0.45, state.flash.t * 0.9);
        ctx.fillRect(0, 0, w, h);
        ctx.globalAlpha = 1;
    }

    if (state.levelUpTimer > 0) {
        ctx.globalAlpha = Math.min(1, state.levelUpTimer * 1.5);
        ctx.fillStyle = '#ffd060';
        ctx.font = 'bold 28px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(t('levelUp') + ' ' + state.level, w / 2, h * 0.22);
        ctx.globalAlpha = 1;
    }
}

const _stars = [];
function drawStars() {
    if (_stars.length === 0) {
        for (let i = 0; i < 50; i++) {
            _stars.push({
                x: Math.random(),
                y: Math.random(),
                r: Math.random() * 1.2 + 0.3,
                tw: Math.random() * Math.PI * 2,
            });
        }
    }
    const w = canvas.clientWidth, h = canvas.clientHeight;
    const tt = performance.now() / 1000;
    _stars.forEach(s => {
        const sx = s.x * w;
        const sy = ((s.y * h + state.distance * 0.15) % h);
        const tw = 0.5 + 0.5 * Math.sin(tt * 1.2 + s.tw);
        ctx.fillStyle = `rgba(200,170,255,${0.2 + tw * 0.3})`;
        ctx.beginPath();
        ctx.arc(sx, sy, s.r, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawGate(g) {
    const tb = trackBounds();
    const y = g.y;
    if (y < -120 || y > canvas.clientHeight + 80) return;

    if (g.type === 'memory') {
        const cx = tb.left + tb.width / 2;
        // Posts
        ctx.fillStyle = '#4a90e0';
        ctx.fillRect(tb.left - 4, y - 12, 8, 26);
        ctx.fillRect(tb.right - 4, y - 12, 8, 26);
        // Top beam
        ctx.fillStyle = '#5aa0f0';
        ctx.fillRect(tb.left - 4, y - 16, tb.width + 8, 6);
        // Glow band
        ctx.fillStyle = 'rgba(120,180,255,0.18)';
        ctx.fillRect(tb.left, y - 10, tb.width, 22);
        // Symbol above
        ctx.font = '38px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#80c0ff';
        ctx.shadowBlur = 14;
        ctx.fillStyle = '#fff';
        ctx.fillText(g.symbol, cx, y - 38);
        ctx.shadowBlur = 0;
    } else {
        const cx = tb.left + tb.width / 2;
        if (g.revealed && g.options) {
            const bannerY = y - 110;
            const bw = Math.min(tb.width + 30, canvas.clientWidth - 16);
            ctx.fillStyle = 'rgba(255,176,96,0.95)';
            ctx.beginPath();
            ctx.roundRect(cx - bw / 2, bannerY - 22, bw, 36, 10);
            ctx.fill();
            ctx.fillStyle = '#1a0a3a';
            ctx.font = 'bold 15px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(questionText(g), cx, bannerY - 4);
        }
        // Doors (drawn dim before revealed)
        for (let i = 0; i < LANE_COUNT; i++) {
            const dx = laneX(i);
            const dw = tb.laneW * 0.78;
            const dh = 64;
            const frameColor = g.revealed ? '#ffb060' : '#5a4a30';
            ctx.fillStyle = frameColor;
            ctx.fillRect(dx - dw / 2 - 3, y - dh + 8, dw + 6, 6);
            ctx.fillRect(dx - dw / 2 - 3, y - dh + 8, 5, dh - 8);
            ctx.fillRect(dx + dw / 2 - 2, y - dh + 8, 5, dh - 8);
            ctx.fillStyle = g.revealed ? 'rgba(255,176,96,0.13)' : 'rgba(120,90,40,0.1)';
            ctx.fillRect(dx - dw / 2, y - dh + 14, dw, dh - 14);
            if (g.revealed && g.options) {
                ctx.font = '32px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#ffb060';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#fff';
                ctx.fillText(g.options[i], dx, y - dh / 2 + 4);
                ctx.shadowBlur = 0;
            } else {
                ctx.font = '24px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = 'rgba(255,176,96,0.4)';
                ctx.fillText('?', dx, y - dh / 2 + 4);
            }
        }
    }
}

function drawPlayer() {
    const p = state.player;
    p.y = playerY();
    const bobY = Math.abs(Math.sin(p.bob)) * 4;
    const lean = Math.sin(p.bob * 2) * 2;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 18, 14, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = '#d8b8ff';
    ctx.beginPath();
    ctx.roundRect(p.x - 9 + lean, p.y - 28 - bobY, 18, 28, 5);
    ctx.fill();

    // Head
    ctx.fillStyle = '#f4e4ff';
    ctx.beginPath();
    ctx.arc(p.x + lean, p.y - 36 - bobY, 9, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#1a0a3a';
    ctx.fillRect(p.x - 3 + lean, p.y - 37 - bobY, 2, 3);
    ctx.fillRect(p.x + 1 + lean, p.y - 37 - bobY, 2, 3);

    // Legs alternating
    const legPhase = Math.sin(p.bob * 1.5);
    ctx.fillStyle = '#a878d8';
    ctx.fillRect(p.x - 6, p.y - 4 - Math.max(0, legPhase) * 6, 4, 12);
    ctx.fillRect(p.x + 2, p.y - 4 - Math.max(0, -legPhase) * 6, 4, 12);

    // Speed lines occasionally
    if (Math.random() < 0.35) {
        ctx.strokeStyle = 'rgba(216,184,255,0.45)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 2; i++) {
            const ly = p.y - 18 - Math.random() * 30;
            const lx = p.x - 14 + Math.random() * 28;
            ctx.beginPath();
            ctx.moveTo(lx, ly);
            ctx.lineTo(lx, ly + 8 + Math.random() * 6);
            ctx.stroke();
        }
    }
}

// roundRect polyfill (for older Safari)
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (typeof r === 'number') r = [r, r, r, r];
        else if (Array.isArray(r) && r.length === 1) r = [r[0], r[0], r[0], r[0]];
        this.beginPath();
        this.moveTo(x + r[0], y);
        this.lineTo(x + w - r[1], y);
        this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
        this.lineTo(x + w, y + h - r[2]);
        this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
        this.lineTo(x + r[3], y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
        this.lineTo(x, y + r[0]);
        this.quadraticCurveTo(x, y, x + r[0], y);
        this.closePath();
        return this;
    };
}

// ══════════════════════════════════
//  HUD / LIFECYCLE
// ══════════════════════════════════

function updateHUD() {
    document.getElementById('hud-lives').textContent = '×' + state.lives;
    document.getElementById('hud-score').textContent = state.score;
    document.getElementById('hud-combo').textContent = state.combo;
    document.getElementById('hud-level').textContent = 'Lv.' + state.level;
}

function startGame() {
    document.getElementById('title-screen').classList.add('hidden');
    document.getElementById('game-container').classList.add('active');
    document.getElementById('result-screen').classList.remove('active');

    canvas = document.getElementById('game-canvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();

    state = initState();
    state.player.x = laneX(1);
    state.player.y = playerY();

    setupInput();

    showTutorial(0);

    updateHUD();
    lastTime = 0;
    cancelAnimationFrame(animId);
    animId = requestAnimationFrame(loop);
}

function showTutorial(step) {
    const tut = document.getElementById('tutorial');
    const c = document.getElementById('tut-content');
    tut.classList.remove('hidden');
    if (step === 0) {
        c.innerHTML = `
            <div class="tut-icons">🐱 ⭐ 🍎</div>
            <h3>${t('tutStep1Title')}</h3>
            <p>${t('tutStep1Text')}</p>
            <button class="tut-next" onclick="showTutorial(1)">${t('tutStep1Btn')}</button>
        `;
    } else {
        c.innerHTML = `
            <div class="tut-icons">🚪 🚪 🚪</div>
            <h3>${t('tutStep2Title')}</h3>
            <p>${t('tutStep2Text')}</p>
            <button class="tut-next" onclick="closeTutorial()">${t('tutStep2Btn')}</button>
        `;
    }
}

function closeTutorial() {
    document.getElementById('tutorial').classList.add('hidden');
}

function endGame() {
    if (!state || state.gameOver) return;
    state.gameOver = true;
    cancelAnimationFrame(animId);

    const rs = document.getElementById('result-screen');
    document.getElementById('result-title').textContent = t('resultTitle');
    document.getElementById('result-subtitle').textContent = t('resultSubtitle');
    document.getElementById('result-stats').innerHTML = `
        <div class="result-stat"><div class="result-stat-val">${state.score}</div><div class="result-stat-lbl">${t('statScore')}</div></div>
        <div class="result-stat"><div class="result-stat-val">${state.bestCombo}</div><div class="result-stat-lbl">${t('statCombo')}</div></div>
        <div class="result-stat"><div class="result-stat-val">${Math.floor(state.distance)}m</div><div class="result-stat-lbl">${t('statDistance')}</div></div>
        <div class="result-stat"><div class="result-stat-val">${state.level}</div><div class="result-stat-lbl">${t('statLevel')}</div></div>
    `;
    document.getElementById('insight-text').textContent = t('insight');
    rs.classList.add('active');
}

function restartGame() {
    document.getElementById('result-screen').classList.remove('active');
    state = initState();
    state.player.x = laneX(1);
    state.player.y = playerY();
    updateHUD();
    closeTutorial();
    lastTime = 0;
    cancelAnimationFrame(animId);
    animId = requestAnimationFrame(loop);
}

// ══════════════════════════════════
//  INIT
// ══════════════════════════════════

window.addEventListener('resize', () => {
    if (canvas) resizeCanvas();
});

const nav = (navigator.language || 'ja').toLowerCase();
if (nav.startsWith('en')) {
    LANG = 'en';
    document.getElementById('lang-btn').textContent = 'JA';
    applyI18n();
}
</script>
